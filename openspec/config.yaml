schema: spec-driven

context: |
  Tech stack: TypeScript, Node.js, Telegraf (Telegram Bot), @kilocode/sdk, SSE events, dotenv, pino
  Architecture: Single-process bot, no database. Session state in-memory (Map<chatId, SessionState>). SSE-based event streaming from local Kilo Code server.
  Testing: No test runner yet (greenfield project, code not written)
  Style: TypeScript with strict mode, flat src/ directory structure
  Conventions: plan_inicial.md defines the implementation plan; README.md defines the project goal

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow patterns in plan_inicial.md
    tdd: false
    test_command: "echo 'No test runner configured yet'"
  verify:
    test_command: "echo 'No test runner configured yet'"
    build_command: "npx tsc --noEmit"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
